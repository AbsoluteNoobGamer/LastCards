name: last_cards_server
description: Last Cards game server
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  last_cards:
    path: ..
  collection: ^1.18.0
  http: ^1.2.2
  shelf: ^1.4.2
  shelf_web_socket: ^2.0.1
  web_socket_channel: ^3.0.1
  uuid: ^4.4.2
  dart_jsonwebtoken: ^2.8.0

dev_dependencies:
  fake_async: ^1.3.1
  test: ^1.24.0

# objective_c >=9.2.0 declares a native-asset build hook, which `dart compile
# exe` refuses to compile ("does not support build hooks, use 'dart build'
# instead") even though the server never uses it — it's a transitive dep of
# sign_in_with_apple pulled in via the `last_cards: path: ..` dependency.
# The root pubspec.yaml pins objective_c for the same reason (iOS symbol
# upload), but dependency_overrides don't propagate through path deps, so
# this package needs its own copy of the pin.
dependency_overrides:
  objective_c: 9.1.0
