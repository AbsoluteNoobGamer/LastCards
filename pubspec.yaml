name: last_cards
description: "Last Cards — Play It All. Leave Nothing."
publish_to: "none"
version: 1.0.0+5

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: "3.35.4"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.1

  # Data / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Fonts
  google_fonts: ^8.0.2

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.2
  shared_preferences: ^2.5.3
  audioplayers: ^6.6.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.8
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3

  # Profile customization
  image_picker: ^1.1.2
  profanity_filter: ^2.0.0
  nsfw_detector_flutter: ^1.0.5
  just_audio: ^0.10.5
  # Aligns BGM with Android/iOS audio focus (used with just_audio interruption handling).
  audio_session: ^0.2.3
  http: ^1.6.0
  share_plus: ^12.0.2
  # 7.x/8.x require Dart >=3.10; ^6.0.0 stays on 6.x until the SDK supports newer plugin majors.
  google_mobile_ads: ^6.0.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  async: ^2.11.0
  fake_async: ^1.3.0
  stream_channel: ^2.1.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4
  analyzer: 7.3.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3
  firebase_auth_mocks: 0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/bgm/
    - assets/audio/sfx/
    - assets/animated_cards/
    - assets/images/
    - assets/images/cardbackcover/
    - assets/images/jokercover/
    - assets/images/cardfaces/default/

  # Fonts loaded via google_fonts package at runtime (no local files needed)

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
