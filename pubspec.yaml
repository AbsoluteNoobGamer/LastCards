name: last_cards
description: "Last Cards — Premium competitive card game."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: "3.35.4"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.1

  # Data / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Fonts
  google_fonts: ^8.0.2

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.2
  shared_preferences: ^2.5.3
  audioplayers: ^6.6.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.8
  google_sign_in: ^6.2.2

  # Profile customization
  image_picker: ^1.1.2
  profanity_filter: ^2.0.0
  nsfw_detector_flutter: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4
  analyzer: 7.3.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/sfx/
    - assets/animated_cards/
    - assets/images/
    - assets/images/cardbackcover/
    - assets/images/jokercover/

  # Fonts loaded via google_fonts package at runtime (no local files needed)

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
