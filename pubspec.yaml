name: last_cards
description: "Last Cards — Premium competitive card game."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: "3.35.4"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.1

  # Data / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Fonts
  google_fonts: ^8.0.2

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.2
  shared_preferences: ^2.5.3
  audioplayers: ^6.6.0

  # Profile customization
  image_picker: ^1.1.2
  profanity_filter: ^2.0.0
  nsfw_detector_flutter: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4
  # custom_lint: 0.7.3
  # riverpod_lint: ^2.3.13
  analyzer: 7.3.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/sfx/
    - assets/animated_cards/
    - assets/images/
    - assets/images/cardbackcover/

  # Fonts loaded via google_fonts package at runtime (no local files needed)
