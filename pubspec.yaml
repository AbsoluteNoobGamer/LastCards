name: last_cards
description: "Last Cards — Play It All. Leave Nothing."
publish_to: "none"
version: 1.0.5+49

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.1

  # Data / models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Fonts
  google_fonts: ^8.0.2

  # Utilities
  collection: ^1.18.0
  uuid: ^4.4.2
  shared_preferences: ^2.5.3

  # Firebase
  firebase_core: ^3.12.1
  firebase_analytics: ^11.3.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.3.8
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3

  # Notifications / Ads
  flutter_local_notifications: ^18.0.1
  google_mobile_ads: ^5.3.1
  in_app_purchase: ^3.3.0
  app_tracking_transparency: ^2.0.6+1

  # Profile customization
  image_picker: ^1.1.2
  profanity_filter: ^2.0.0
  nsfw_detector_flutter: ^1.0.5
  http: ^1.6.0
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  # flame_audio >=2.12.0 requires Dart SDK >=3.11; keep <2.12 for Dart 3.9.x CI.
  flame_audio: ">=2.11.14 <2.12.0"
  flutter_shaders: ^0.1.3

dev_dependencies:
  async: ^2.11.0
  fake_async: ^1.3.0
  stream_channel: ^2.1.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4
  analyzer: 7.3.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.3
  firebase_auth_mocks: 0.14.1

# Avoids iOS "Upload Symbols Failed" for objective_c.framework (dart-lang/native#3004).
dependency_overrides:
  objective_c: 9.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/bgm/
    - assets/audio/sfx/
    - assets/animated_cards/
    - assets/avatars/
    - assets/images/
    - assets/images/cardbackcover/
    - assets/images/jokercover/
    - assets/images/cardfaces/default/

  # Fonts loaded via google_fonts package at runtime (no local files needed)

  shaders:
    - shaders/card_shimmer.frag
    - shaders/felt_background.frag

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
