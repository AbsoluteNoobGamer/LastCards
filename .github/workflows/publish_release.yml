# Manually-triggered broadcast of a new app_config/app_update doc.
#
# Run this ONLY after the store(s) you're announcing show the build as
# actually live/approved (not just uploaded) — see docs/release-checklist.md.
# It reads the version from pubspec.yaml, writes
# latestBuildAndroid/latestBuildIos/latestVersionName (and the store URLs) to
# Firestore, and the deployed server picks it up on its next 10-minute poll
# and pushes the "update available" notification.
#
# If Android has cleared review but iOS hasn't yet, check "android_only" —
# this skips writing latestBuildIos (so iOS devices don't get a stale
# "update available" banner for a build that isn't in the App Store yet) and
# switches the push copy to call out Android specifically. Re-run this
# workflow with android_only unchecked once iOS clears review to announce it
# there too.
#
# Emergency: set patch_ios_latest / patch_ios_minimum to roll back only the
# iOS gate fields (Android untouched) — e.g. after a mistaken full announce
# while App Review is still pending.
name: Publish release (push notification)

on:
  workflow_dispatch:
    inputs:
      android_only:
        description: "iOS build for this version isn't live yet (e.g. still in App Review) — announce Android only"
        type: boolean
        required: false
        default: false
      patch_ios_latest:
        description: "Emergency: only set latestBuildIos to this int (leave blank for normal publish)"
        required: false
        default: ""
      patch_ios_minimum:
        description: "Emergency: only set minimumBuildIos to this int (0 = disable iOS force gate)"
        required: false
        default: ""
      ios_store_url:
        description: "iOS App Store URL (only needed if it ever changes)"
        required: false
        default: "https://apps.apple.com/app/id6769810523"
      android_store_url:
        description: "Play Store URL (only needed if it ever changes)"
        required: false
        default: "https://play.google.com/store/apps/details?id=com.lastcards.app.paid"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Pub get (server package)
        working-directory: server
        run: dart pub get

      - name: Publish release
        working-directory: server
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANDROID_ONLY: ${{ inputs.android_only }}
          PATCH_IOS_LATEST: ${{ inputs.patch_ios_latest }}
          PATCH_IOS_MINIMUM: ${{ inputs.patch_ios_minimum }}
        run: |
          EXTRA_ARGS=()
          if [ -n "$PATCH_IOS_LATEST" ] || [ -n "$PATCH_IOS_MINIMUM" ]; then
            if [ -n "$PATCH_IOS_LATEST" ]; then
              EXTRA_ARGS+=(--patch-ios-latest="$PATCH_IOS_LATEST")
            fi
            if [ -n "$PATCH_IOS_MINIMUM" ]; then
              EXTRA_ARGS+=(--patch-ios-minimum="$PATCH_IOS_MINIMUM")
            fi
            dart run bin/publish_release.dart --yes "${EXTRA_ARGS[@]}"
          else
            if [ "$ANDROID_ONLY" = "true" ]; then
              EXTRA_ARGS+=(--android-only)
            fi
            dart run bin/publish_release.dart \
              --yes \
              --ios-store-url="${{ inputs.ios_store_url }}" \
              --android-store-url="${{ inputs.android_store_url }}" \
              "${EXTRA_ARGS[@]}"
          fi
