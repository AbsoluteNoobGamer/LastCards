# Runs on every push and PR. Keeps analyze + tests green before merge.
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firestore-rules:
    name: Firestore rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Intentionally no `cache: npm` — setup-node requires package-lock.json at
          # checkout to enable npm caching; branches without it fail before npm ci.
          # Re-enable `cache: npm` once package-lock.json is on all target branches.

      - name: Install npm deps
        run: npm ci

      - name: Firestore rules unit tests (emulator)
        run: npm run test:firestore-rules

  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Bundled Dart SDK must satisfy in_app_purchase's ^3.10.0 minimum
          # (pubspec.yaml) — 3.35.4's Dart 3.9.2 fell behind this and broke
          # `flutter pub get` in CI (while working locally on newer Flutter
          # installs), even though nothing in this repo's own code changed.
          # Pinned to the exact version already verified working locally
          # throughout recent development.
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (Flutter app)
        run: flutter analyze

      - name: Pub get (server package)
        working-directory: server
        run: dart pub get

      - name: Analyze (server package)
        working-directory: server
        run: dart analyze

      - name: Test
        run: flutter test
